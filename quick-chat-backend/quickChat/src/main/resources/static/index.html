<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>
<body>

<h2>WebSocket Chat</h2>
<div>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="connect()">Connect</button>
</div>

<div>
    <input type="text" id="message" placeholder="Type a message">
    <button onclick="sendMessage()">Send Message</button>
</div>

<div>
    <input type="text" id="private-user" placeholder="Recipient username">
    <input type="text" id="private-message" placeholder="Private message">
    <button onclick="sendPrivateMessage()">Send Private Message</button>
</div>

<h3>Public Messages:</h3>
<ul id="public-messages"></ul>

<h3>Private Messages:</h3>
<ul id="private-messages"></ul>

<script>
    let stompClient = null;
    let username = null;

    function connect() {
        username = document.getElementById("username").value.trim();
        if (!username) {
            alert("Please enter a username!");
            return;
        }

        const socket = new SockJS('/ws'); // WebSocket endpoint from Spring Boot
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("Connected as " + username);

            // Subscribe to public chat
            stompClient.subscribe('/topic/public', function (message) {
                showMessage(JSON.parse(message.body), 'public-messages');
            });

            // Subscribe to private messages
            stompClient.subscribe('/user/' + username + '/queue/messages', function (message) {
                showMessage(JSON.parse(message.body), 'private-messages');
            });

            // Send the "add user" event
            stompClient.send("/app/addUser", {}, JSON.stringify({sender: username, type: "JOIN"}));
        }, function (error) {
            console.log("Error connecting to WebSocket:", error);
        });
    }

    function sendMessage() {
        const messageContent = document.getElementById("message").value.trim();
        if (messageContent && stompClient) {
            const chatMessage = {
                sender: username,
                content: messageContent,
                type: "CHAT"
            };
            stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
            document.getElementById("message").value = "";
        }
    }

    function sendPrivateMessage() {
        const recipient = document.getElementById("private-user").value.trim();
        const messageContent = document.getElementById("private-message").value.trim();
        if (recipient && messageContent && stompClient) {
            const privateMessage = {
                sender: username,
                content: messageContent,
                type: "PRIVATE",
                recipient: recipient
            };
            stompClient.send("/app/privateMessage", {}, JSON.stringify(privateMessage));
            document.getElementById("private-message").value = "";
        }
    }

    function showMessage(message, listId) {
        const messageList = document.getElementById(listId);
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(message.sender + ": " + message.content));
        messageList.appendChild(li);
    }
</script>

</body>
</html>
