<div class="users-container">
  <div class="welcome-container">
    <img class="user-avatar"
      [src]="loginUser?.profileImage || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + loginUser?.userName"
      (error)="onImgError($event)" alt="User avatar" />
    <p class="welcome-message">Hi {{ loginUser.userName }}, welcome to QuickChat!</p>
  </div>
  <!-- Search Box -->
  <div class="chat-search-box">
    <div class="search-input-group">
      <input class="form-control" placeholder="Search" />
      <button type="button" class="btn-search">
        <i class="fa fa-search"></i>
      </button>
    </div>
  </div>

  <!-- User List -->
  <ul class="users-list">
    <ng-container *ngFor="let activeUser of activeUsers">
      <ng-container *ngIf="activeUser.userEmail !== loginUser.userEmail">
        <li class="user-item" (click)="selectUser(activeUser)">
          <div class="user-avatar">
            <img [src]="getProfileImageSrc(activeUser)" (error)="onImgError($event)" alt="User avatar" />
            <span class="status online"></span>
          </div>
          <div class="user-details">
            <span class="name">{{ activeUser.userName }}</span>
            <span class="time">15/02/2019</span>
          </div>
        </li>
      </ng-container>
    </ng-container>
  </ul>
</div>
