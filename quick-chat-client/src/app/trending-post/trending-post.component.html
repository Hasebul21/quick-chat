<p class="fancy-title trending-header" *ngIf="trendingPosts.length > 0">Trending Now</p>

<div class="post-grid">
  <mat-card *ngFor="let post of trendingPosts" class="styled-post-card small-card">
    <mat-card-header>
      <div class="post-header">
        <div class="avatar-wrapper">
          <img [src]="post.creatorImage || 'https://robohash.org/robot'" alt="Creator's Avatar"
            class="creator-avatar-img" />
        </div>
        <div class="user-info">
          <mat-card-title class="post-user">{{ post.creatorName }}</mat-card-title>
          <mat-card-subtitle class="post-timestamp">{{ post.createdDate }}</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>
    <mat-card-content>
      <p class="post-content">{{ post.content }}</p>
    </mat-card-content>
    <mat-card-actions class="post-actions">
      <button mat-icon-button color="primary" disabled="true"><mat-icon>thumb_up</mat-icon></button>
      <span class="action-count">{{ post.likeCount }}</span>
      <button mat-icon-button color="warn" disabled="true"><mat-icon>thumb_down</mat-icon></button>
      <span class="action-count">{{ post.dislikeCount }}</span>
    </mat-card-actions>
  </mat-card>
  <div *ngIf="trendingPosts.length === 0" class="no-posts">
    <p>No trending posts available.</p>
  </div>
</div>
