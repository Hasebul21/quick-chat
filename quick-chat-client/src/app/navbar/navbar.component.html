<nav class="navbar">
  <!-- Left: Brand -->
  <a class="brand" routerLink="/home">
    <span class="brand-icon">💬</span>
    <span class="brand-name">QuickChat</span>
  </a>

  <!-- Center: Nav Links (desktop) -->
  <div class="nav-links" [class.open]="mobileMenuOpen">
    <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen = false">
      <mat-icon>home</mat-icon><span>Home</span>
    </a>
    <a routerLink="/chatroom" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen = false">
      <mat-icon>chat_bubble</mat-icon><span>Chats</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen = false">
      <mat-icon>person</mat-icon><span>Profile</span>
    </a>
    <a routerLink="/posts" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen = false">
      <mat-icon>dynamic_feed</mat-icon><span>Feed</span>
    </a>
  </div>

  <!-- Right: User area -->
  <div class="nav-right">
    <ng-container *ngIf="loggedInUser; else loginTpl">
      <button class="user-btn" [matMenuTriggerFor]="userMenu">
        <img class="avatar"
          [src]="loggedInUser?.profileImage || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + loggedInUser?.userName"
          (error)="$any($event.target).src='https://api.dicebear.com/7.x/avataaars/svg?seed=default'" alt="avatar" />
        <span class="username">{{ loggedInUser.userName }}</span>
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" class="user-dropdown">
        <div class="menu-header">
          <img class="menu-avatar"
            [src]="loggedInUser?.profileImage || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + loggedInUser?.userName"
            (error)="$any($event.target).src='https://api.dicebear.com/7.x/avataaars/svg?seed=default'" alt="avatar" />
          <div>
            <div class="menu-name">{{ loggedInUser.userName }}</div>
            <div class="menu-email">{{ loggedInUser.userEmail }}</div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/profile">
          <mat-icon>manage_accounts</mat-icon> My Profile
        </button>
        <button mat-menu-item routerLink="/posts">
          <mat-icon>dynamic_feed</mat-icon> My Feed
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item class="logout-item" (click)="logout()">
          <mat-icon>logout</mat-icon> Logout
        </button>
      </mat-menu>
    </ng-container>

    <ng-template #loginTpl>
      <a class="login-btn" routerLink="/login">
        <mat-icon>login</mat-icon> Login
      </a>
    </ng-template>

    <!-- Hamburger (mobile) -->
    <button class="hamburger" (click)="mobileMenuOpen = !mobileMenuOpen" aria-label="Toggle menu">
      <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>
</nav>
