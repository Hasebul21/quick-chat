<mat-toolbar color="primary" class="toolbar">
    <!-- Left section: App Name -->
    <div class="app-name">
      <span>💬 Quick Chats App</span>
    </div>
  
    <div class="nav-links">
      <a href="/home" class="nav-link">Home</a>
      <a href="/chatroom" class="nav-link">Chats</a>
      <a href="/profile" class="nav-link">Profile</a>
      <a href="/posts" class="nav-link">Feed</a>
    </div>
  
    <!-- Right section: User Profile and Logout Button -->
    <div class="user-profile" *ngIf="loggedInUser; else logoutTemplate">
      <span class="username">{{ loggedInUser.userName }}</span>
      <img class="profile-image" [src]="loggedInUser?.profileImage || 'https://robohash.org/robot'" alt="User Photo" />
      <button mat-button class="logout-btn" (click)="logout()">Logout</button>
    </div>
    
    <ng-template #logoutTemplate>
      <a mat-button class="login-btn" routerLink="/login">Login</a>
    </ng-template>
  </mat-toolbar>
