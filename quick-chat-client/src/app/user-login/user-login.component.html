<body>
  <div class="login-container">
    <form class="login-form" autocomplete="off">

      <!-- App Branding -->
      <div class="app-brand">
        <div class="brand-logo">💬</div>
        <h1 class="brand-name">QuickChat</h1>
        <p class="brand-tagline">Connect. Chat. Collaborate.</p>
      </div>

      <h2>Welcome Back</h2>
      <p>Please log in to continue</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" [(ngModel)]="username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" [(ngModel)]="password" />
      </div>

      <button type="submit" (click)="login()">Log In</button>

      <p class="register-link">New to QuickChat? <a [routerLink]="'/register'">Create an account</a></p>
    </form>
  </div>
</body>
